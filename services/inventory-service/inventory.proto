syntax = "proto3";
package inventory;

// 1. Messages de base
message Medication {
  string id = 1;
  string name = 2;
  string dosage = 3;
  int32 stock_quantity = 4;
  double price = 5;
  string supplier = 6;
  bool is_low_stock = 7;
  string created_at = 8;
}

// 2. Message Utilitaire (Déplacé ici pour être accessible)
message Empty {}

// 3. Messages de Requêtes
message AddMedicationRequest { 
  string name = 1; 
  string dosage = 2; 
  int32 stock_quantity = 3; 
  double price = 4; 
  string supplier = 5; 
}

message GetMedicationRequest { 
  string id = 1; 
}

message UpdateStockRequest { 
  string id = 1; 
  int32 quantity_change = 2; 
}

message CheckAvailabilityRequest { 
  string medication_id = 1; 
  int32 requested_quantity = 2; 
}

message ReserveMedicationRequest { 
  string medication_id = 1; 
  int32 quantity = 2; 
  string prescription_id = 3; 
}

// 4. Messages de Réponses
message MedicationResponse { 
  bool success = 1; 
  string message = 2; 
  Medication medication = 3; 
}

message MedicationsResponse { 
  bool success = 1; 
  repeated Medication medications = 2; 
}

message AvailabilityResponse { 
  bool success = 1; 
  bool available = 2; 
  int32 remaining_stock = 3; 
}

message OperationResponse { 
  bool success = 1; 
  string message = 2; 
}

// 5. Définition du Service (Tous les types utilisés ci-dessous sont maintenant définis)
service InventoryService {
  rpc AddMedication(AddMedicationRequest) returns (MedicationResponse);
  rpc GetMedication(GetMedicationRequest) returns (MedicationResponse);
  rpc UpdateStock(UpdateStockRequest) returns (OperationResponse);
  rpc CheckAvailability(CheckAvailabilityRequest) returns (AvailabilityResponse);
  rpc ListMedications(Empty) returns (MedicationsResponse);
  rpc GetLowStockMedications(Empty) returns (MedicationsResponse);
  rpc ReserveMedication(ReserveMedicationRequest) returns (OperationResponse);
}