syntax = "proto3";
package notification;

message Notification {
  string id = 1;
  string user_id = 2;
  string channel = 3; // email, sms, push
  string subject = 4;
  string body = 5;
  string status = 6; // pending, sent, failed
  string sent_at = 7;
}

message SendEmailRequest { string user_id = 1; string to_email = 2; string subject = 3; string body = 4; }
message SendSMSRequest { string user_id = 1; string phone = 2; string message = 3; }
message SendPushRequest { string user_id = 1; string title = 2; string body = 3; }
message GetHistoryRequest { string user_id = 1; }

message NotificationResponse { bool success = 1; string message = 2; Notification notification = 3; }
message NotificationsResponse { bool success = 1; repeated Notification notifications = 2; }
message OperationResponse { bool success = 1; string message = 2; }

service NotificationService {
  rpc SendEmail(SendEmailRequest) returns (NotificationResponse);
  rpc SendSMS(SendSMSRequest) returns (NotificationResponse);
  rpc SendPush(SendPushRequest) returns (NotificationResponse);
  rpc GetHistory(GetHistoryRequest) returns (NotificationsResponse);
  rpc ListNotifications(Empty) returns (NotificationsResponse);
}

message Empty {}