# docker-compose.yml - SmartHealth Platform v2.0
# Architecture: 1 Gateway + 6 Microservices + Kafka (KRaft)
# Ports: 4000 (Gateway), 50051-50059 (gRPC services), 9092 (Kafka)


services:
  # =============================================================================
  # 📡 KAFKA BROKER (Mode KRaft - Sans ZooKeeper)
  # =============================================================================
  kafka:
    image: apache/kafka:4.2.0
    container_name: smarthealth-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      # Configuration KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Optimisations Dev
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smarthealth-net

  # =============================================================================
  # 🏥 MICROSERVICES (gRPC + SQLite/RxDB + Kafka)
  # =============================================================================

  # 🔹 Patient Service (Port 50051) - Yassine
  patient-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_DIR: services/patient-service
        SERVICE_PORT: 50051
    container_name: patient-service
    ports:
      - "50051:50051"
    environment:
      - NODE_ENV=development
      - KAFKA_BROKER=kafka:9092
      - KAFKA_CLIENT_ID=patient-service
      - DB_PATH=/app/data/patients.db
    volumes:
      - ./services/patient-service:/app
      - /app/node_modules 
      - patient-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - smarthealth-net
    restart: unless-stopped

  # 🔹 Doctor Service (Port 50054) - Baha
  doctor-service:
