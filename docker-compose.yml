      - KAFKA_BROKER=kafka:9092
      - KAFKA_CLIENT_ID=notification-service
      - DB_PATH=/app/data/notifications.db
      # Email config (optionnel - valeurs par défaut pour dev)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=dev@smarthealth.test
      - SMTP_PASS=dev_password_placeholder
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
      - notification-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - smarthealth-net
    restart: unless-stopped

    # 🔹 Alert Service (Port 50053) - Ahmed
  alert-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_DIR: services/alert-service
        SERVICE_PORT: 50053
    container_name: alert-service
    ports:
      - "50053:50053"
    environment:
