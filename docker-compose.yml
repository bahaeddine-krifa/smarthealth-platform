    restart: unless-stopped

  # =============================================================================
  # 🚀 API GATEWAY (Port 4000) - Baha
  # =============================================================================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: api-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      # Connexion aux microservices via noms de conteneur Docker
      - PATIENT_SERVICE_HOST=patient-service:50051
      - DOCTOR_SERVICE_HOST=doctor-service:50054
      - RENDEZVOUS_SERVICE_HOST=rendezvous-service:50052
      - MEDICAL_RECORD_SERVICE_HOST=medical-record-service:50056
      - PAYMENT_SERVICE_HOST=payment-service:50055
      - INVENTORY_SERVICE_HOST=inventory-service:50057
      - LABORATORY_SERVICE_HOST=laboratory-service:50058
      - NOTIFICATION_SERVICE_HOST=notification-service:50059
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    depends_on:
      patient-service: { condition: service_started }
      doctor-service: { condition: service_started }
      rendezvous-service: { condition: service_started }
      medical-record-service: { condition: service_started }
      payment-service: { condition: service_started }
      inventory-service: { condition: service_started }
      laboratory-service: { condition: service_started }
      notification-service: { condition: service_started }
      kafka: { condition: service_healthy }
    networks:
      - smarthealth-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # =============================================================================
  # 📊 KAFKA UI (Optionnel - Monitoring) - Bonus Démo
  # =============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smarthealth-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smarthealth-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9999
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - smarthealth-net
    profiles:
      - monitoring  # Lancez avec: docker compose --profile monitoring up -d

# =============================================================================
# 🗄️ VOLUMES PERSISTANTS (Données conservées entre redémarrages)
# =============================================================================
volumes:
  kafka-data:
    driver: local
  patient-data:
    driver: local
  doctor-data:
    driver: local
  rendezvous-data:
    driver: local
  medical-record-data:
    driver: local
  payment-data:
    driver: local
  inventory-data:
    driver: local
  laboratory-data:
    driver: local
  notification-data:
    driver: local
  alert-data:
    driver: local

# =============================================================================
# 🌐 RÉSEAU ISOLÉ (Communication interne sécurisée)
# =============================================================================
networks:
  smarthealth-net:
    driver: bridge