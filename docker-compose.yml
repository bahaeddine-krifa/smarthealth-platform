      - NODE_ENV=development
      - KAFKA_BROKER=kafka:9092
      - KAFKA_CLIENT_ID=doctor-service
      - DB_PATH=/app/data/doctors.db
    volumes:
      - ./services/doctor-service:/app
      - /app/node_modules 
      - doctor-data:/app/data
